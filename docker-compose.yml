version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: hankyu_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hankyu_hanshin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hankyu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
